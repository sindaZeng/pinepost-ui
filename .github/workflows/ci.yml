name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify public text
        run: pnpm verify:public-text

      - name: Typecheck library
        run: pnpm typecheck

      - name: Typecheck demo
        run: pnpm typecheck:demo

      - name: Test
        run: pnpm test

      - name: Build library
        run: pnpm build

      - name: Build demo
        run: pnpm build:demo

      - name: Verify demo build
        run: pnpm verify:demo

      - name: Verify package contents
        run: pnpm pack --dry-run
